pre-commit:
  parallel: true
  commands:
    # Secret scanning — runs before every commit
    secrets:
      run: |
        if command -v gitleaks &>/dev/null; then
          gitleaks protect --staged --config .gitleaks.toml --verbose
        else
          echo "⚠ gitleaks not installed — skipping local secret scan"
          echo "  Install: https://github.com/gitleaks/gitleaks#installing"
        fi

    # Block .env files from being committed
    no-env-files:
      glob: ".env*"
      exclude: ".env.example"
      run: |
        echo "❌ Attempted to commit an .env file: {staged_files}"
        echo "   Only .env.example should be committed."
        exit 1

pre-push:
  commands:
    # Full history scan on push
    secrets-history:
      run: |
        if command -v gitleaks &>/dev/null; then
          gitleaks detect --config .gitleaks.toml --verbose --log-level warn
        else
          echo "⚠ gitleaks not installed — skipping history scan on push"
        fi
